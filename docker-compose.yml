version: '3.9'

services:

  # ── PostgreSQL — conversation + experiment state ────────
  postgres:
    image: postgres:15-alpine
    container_name: iterallm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: iterallm
      POSTGRES_USER: iterallm
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iterallm"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis — session cache + fast lookups ────────────────
  redis:
    image: redis:7-alpine
    container_name: iterallm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  # ── Zookeeper — required by Kafka ───────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: iterallm_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper

  # ── Kafka — event streaming for feedback pipeline ───────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: iterallm_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168     # 7 days
    volumes:
      - kafka_data:/var/lib/kafka

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data: